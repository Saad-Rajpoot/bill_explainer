name: bijli_samjho
description: "Bijli Samjho - Pakistan electricity bill analyzer app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # ─── State Management ───────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ─── Functional Programming ────────────────────────────────────
  dartz: ^0.10.1

  # ─── Local Database ─────────────────────────────────────────────
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # ─── Remote Backend ─────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ─── Image & OCR ────────────────────────────────────────────────
  image_picker: ^1.1.2
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.13.0
  image: ^4.2.0
  image_cropper: ^5.0.0
  google_generative_ai: ^0.4.5

  # ─── Navigation ─────────────────────────────────────────────────
  go_router: ^14.3.0

  # ─── Dependency Injection ───────────────────────────────────────
  # injectable removed — DI is wired manually in injection_container.dart
  get_it: ^8.0.2

  # ─── Network ────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # ─── UI / UX ────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # ─── Ads ────────────────────────────────────────────────────────
  google_mobile_ads: ^5.1.0

  # ─── Utils ──────────────────────────────────────────────────────
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # injectable_generator removed — conflicts with isar_generator analyzer dep
  isar_generator: ^3.1.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

dependency_overrides:
  camera_android_camerax: 0.6.5
